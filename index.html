<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema UI Glassmorphism - Ángel Team</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

    <!-- Capa de Orbes Animados de Yox -->
    <div class="glass-background">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
    </div>

    <div class="lab-container" style="max-width: 1400px; margin: 0 auto; padding: 40px 20px;">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 style="color: var(--primary-color, #3ee7b8); font-size: 3rem; margin: 0; font-weight: 800; letter-spacing: -1px;">Librería Core UI</h1>
            <p style="color: var(--text-muted, #94a3b8); margin-top: 8px; font-size: 16px;">Arquitectura de Componentes Empresariales - Sprint Final</p>
        </header>

        <main class="grid-layout">
            
            <section class="sidebar">
                <div class="panel-cristal">
                    <div class="panel-titulo">Asignación de Tareas</div>
                    <div class="control-group">
                        
                        <div>
                            <span class="label-tech">1. Usuario Responsable:</span>
                            <input-text id="in-usuario" tipo="letras" placeholder="Ej: Angel Torres" ancho="100%"></input-text>
                        </div>

                        <div>
                            <span class="label-tech">2. Tipo de Tarea:</span>
                            <custom-select id="sel-categoria" enable-search="false" multiple="false" placeholder="Hogar, Viajes, Escuela..."></custom-select>
                        </div>

                        <div style="margin-top: 10px;">
                            <span class="label-tech">3. Fecha de Entrega:</span>
                            <date-range id="cal-fecha" color-tema="#3ee7b8" allow-past="false" allow-future="true"></date-range>
                        </div>

                        <button class="btn-trigger" id="btn-abrir-modal" style="background:#3b82f6;color:white;width:100%;margin-top:15px;padding:12px;">
                            Siguiente: Detalles de la Tarea ➔
                        </button>

                    </div>
                </div>
            </section>

            <section class="main-content">
                <div style="flex-grow: 1; display: flex; flex-direction: column;">
                    <h3 class="panel-titulo" style="margin-bottom: 10px; padding-left: 10px;">Tablero de Ejecución</h3>
                    <custom-table id="tabla-tareas" page-size="6" ancho="100%"></custom-table>
                </div>
            </section>
        </main>
    </div> <custom-modal 
        id="modal-tarea" 
        type="custom" 
        bg-color="rgba(15, 23, 42, 0.9)" 
        btn-1="Guardar Tarea" 
        btn-2="Cancelar">
        
        <h3 style="color: #3ee7b8; margin-top: 0; margin-bottom: 5px;">Redactar Detalles</h3>
        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 25px;">Define qué se debe realizar en esta asignación.</p>
        
        <div style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
            <div>
                <label style="font-size: 12px; color: #94a3b8; margin-bottom: 5px; display: block;">Nombre de la Tarea:</label>
                <input-text id="in-nombre-tarea" tipo="todo" min="5" max="50" placeholder="Ej: Configurar entorno backend"></input-text>
            </div>
            <div>
                <label style="font-size: 12px; color: #94a3b8; margin-bottom: 5px; display: block;">Descripción o Notas (Sin caracteres especiales):</label>
                <input-text id="in-desc-tarea" tipo="sin-especiales" min="0" max="100" placeholder="Ej: Utilizar el framework pactado"></input-text>
            </div>
            <div>
                <label style="font-size: 12px; color: #94a3b8; margin-bottom: 5px; display: block;">Estado Inicial:</label>
                <custom-select id="sel-estado" enable-search="false" multiple="false" placeholder="Seleccione..."></custom-select>
            </div>
        </div>
    </custom-modal>

    <!-- DateRange (componente propio) -->
    <script type="module" src="./src/index.js"></script>

    <script type="module" src="./assets/app.js"></script>
</body>
</html>
