<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Aislada - Tooltip Glassmorphism</title>
    
    <link rel="stylesheet" href="../../theme.css">
    <link rel="stylesheet" href="./style.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Estilos básicos solo para que la página de prueba se vea bien */
        body {
            background-color: #0f172a; /* Fondo oscuro de tu diseño */
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            color: #f8fafc;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .sandbox {
            display: flex;
            gap: 40px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .btn-prueba {
            padding: 10px 20px;
            background: #3ee7b8;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 40px; color: #3ee7b8;">Laboratorio: Tooltip</h2>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // --- EL COMPONENTE TOOLTIP ---
        function Tooltip({ children, contenido, posicion = 'arriba', ancho = 'max-content' }) {
            const [visible, setVisible] = useState(false);
            const timeoutRef = useRef(null);

            const mostrar = () => {
                timeoutRef.current = setTimeout(() => setVisible(true), 200);
            };
            const ocultar = () => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                setVisible(false);
            };

            return (
                <div className="custom-tooltip-wrapper" onMouseEnter={mostrar} onMouseLeave={ocultar}>
                    {children}
                    {visible && (
                        <div className={`tooltip-box tooltip-${posicion}`} style={{ width: ancho }}>
                            <div className="tooltip-content">
                                {contenido}
                            </div>
                            <div className="tooltip-arrow"></div>
                        </div>
                    )}
                </div>
            );
        }

        // --- LA ESCENA DE PRUEBAS ---
        function App() {
            return (
                <div className="sandbox">
                    {/* Tooltip Arriba */}
                    <Tooltip posicion="arriba" contenido="Este tooltip aparece arriba">
                        <button className="btn-prueba">Pasa el ratón</button>
                    </Tooltip>

                    {/* Tooltip Abajo */}
                    <Tooltip posicion="abajo" contenido="Este tooltip aparece abajo">
                        <button className="btn-prueba" style={{ background: 'transparent', color: '#fff', border: '1px solid #3ee7b8' }}>
                            Prueba Abajo
                        </button>
                    </Tooltip>

                    {/* Tooltip con Imagen a la Derecha */}
                    <Tooltip 
                        posicion="derecha" 
                        ancho="160px" 
                        contenido={
                            <div>
                                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=150&q=80" style={{ width: '100%', borderRadius: '4px' }} alt="mapa" />
                                <p style={{ margin: '5px 0 0 0', fontSize: '11px', color: '#cbd5e1' }}>Vista previa del mapa</p>
                            </div>
                        }
                    >
                        <span style={{ color: '#29a3ff', textDecoration: 'underline', cursor: 'pointer', display: 'flex', alignItems: 'center' }}>
                            Ver Imagen
                        </span>
                    </Tooltip>
                </div>
            );
        }

        // 4. Arrancamos la aplicación
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
