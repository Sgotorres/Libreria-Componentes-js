<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Aislada - Custom Input</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; margin: 0; 
            color: white; font-family: system-ui, sans-serif; 
        }
        .sandbox { 
            background: rgba(255,255,255,0.03); padding: 40px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 500px;
            display: flex; flex-direction: column; gap: 25px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .label { font-size: 13px; color: #cbd5e1; margin-bottom: 8px; display: block; font-weight: 500;}
    </style>
</head>
<body>
    
    <div class="sandbox">
        <h3 style="color: #3ee7b8; margin-top: 0; text-align: center; font-weight: 600;">Prueba: Custom Input (David)</h3>
        
        <div>
            <span class="label">1. Solo Números (Mín 3, Máx 8)</span>
            <custom-input tipo="numeros" min="3" max="8" ancho="100%" largo="45px" placeholder="Ej: 123456"></custom-input>
        </div>

        <div>
            <span class="label">2. Solo Letras</span>
            <custom-input tipo="letras" ancho="100%" largo="45px" placeholder="Ej: Angel Torres"></custom-input>
        </div>

        <div>
            <span class="label">3. Letras y Números (Sin caracteres especiales)</span>
            <custom-input tipo="sin-especiales" ancho="100%" largo="45px" placeholder="Ej: User2026"></custom-input>
        </div>

        <div>
            <span class="label">4. Todo (Admite especiales)</span>
            <custom-input tipo="todo" ancho="100%" largo="45px" placeholder="Ej: hola@mundo.com!"></custom-input>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>
</html>
